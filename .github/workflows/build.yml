name: build

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  # Every .NET sample is standalone: build the folder, run it, hold it to its own claims.
  dotnet-samples:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - dir: deterministic-kernel
            expect: "byte-identical  : True"
          - dir: netmq-event-pipeline
            expect: "handshake first: received 1,000 of 1,000 events"
          - dir: gated-agent-delivery
            expect: "resumed after crash: True"
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build
        run: dotnet build ${{ matrix.dir }} --nologo

      - name: Run and verify
        run: |
          dotnet run --project ${{ matrix.dir }} --no-build | tee run.out
          grep -F "${{ matrix.expect }}" run.out

  # The TUI pair: build both halves, then smoke the SSE stream and the command endpoint.
  go-tui-dotnet-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: go-tui-dotnet-backend/tui/go.sum

      - name: Build backend
        run: dotnet build go-tui-dotnet-backend/backend --nologo

      - name: Smoke the SSE stream and command endpoint
        run: |
          dotnet run --project go-tui-dotnet-backend/backend --no-build &
          sleep 6
          curl -s --max-time 5 -N http://127.0.0.1:5058/run/events | head -6 | tee sse.out || true
          grep -F '"kind":"run"' sse.out
          curl -s -X POST http://127.0.0.1:5058/run/command \
            -H 'Content-Type: application/json' -d '{"action":"pause"}' | grep -F '"ok":true'

      - name: Vet and build the TUI
        working-directory: go-tui-dotnet-backend/tui
        run: |
          go vet ./...
          go build ./...
